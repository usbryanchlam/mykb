name: Deploy

on:
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Create API test env
        run: |
          cat > apps/api/.env.test << 'EOF'
          TZ=UTC
          PORT=3333
          HOST=localhost
          NODE_ENV=test
          LOG_LEVEL=error
          APP_KEY=ci-test-key-not-for-production
          APP_URL=http://localhost:3333
          AUTH0_ISSUER_BASE_URL=http://localhost:3999
          AUTH0_AUDIENCE=https://mykb.bryanlam.dev/api
          EOF
      - run: pnpm turbo build
      - run: pnpm turbo test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to OCI VM
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17 # v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
            set -e

            cd /opt/mykb

            echo "==> Deploy started: $(git rev-parse HEAD) at $(date -u +%Y-%m-%dT%H:%M:%SZ)"

            echo "==> Pulling latest changes..."
            git pull --ff-only origin main

            echo "==> Installing dependencies..."
            pnpm install --frozen-lockfile

            echo "==> Building..."
            pnpm turbo build

            echo "==> Post-build setup..."
            # Copy .env to build dir (AdonisJS loads env from build/ in production)
            cp apps/api/.env apps/api/build/.env
            # Symlink tmp dir so DB path resolves correctly from build/
            mkdir -p apps/api/tmp
            rm -rf apps/api/build/tmp
            ln -sf /opt/mykb/apps/api/tmp apps/api/build/tmp

            echo "==> Backing up database..."
            if [ -f apps/api/tmp/db.sqlite3 ]; then
              cp apps/api/tmp/db.sqlite3 "apps/api/tmp/db.sqlite3.bak-$(date +%s)"
            fi

            echo "==> Running migrations..."
            cd apps/api
            node ace migration:run --force  # --force skips interactive prompt in production
            cd ../..

            echo "==> Restarting services..."
            if pm2 describe mykb-api > /dev/null 2>&1; then
              pm2 restart infra/ecosystem.config.cjs --update-env
            else
              pm2 start infra/ecosystem.config.cjs
            fi
            pm2 save

            echo "==> Waiting for services to start..."
            for i in $(seq 1 12); do
              if curl -sf http://localhost:3333/health > /dev/null 2>&1; then
                echo "API is up after attempt $i."
                break
              fi
              echo "Waiting... attempt $i/12"
              sleep 5
              if [ "$i" -eq 12 ]; then
                echo "Timed out waiting for API to start." >&2
                pm2 logs --lines 20 --nostream
                exit 1
              fi
            done

            echo "==> Deploy complete: $(git rev-parse HEAD)"
